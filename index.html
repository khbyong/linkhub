<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Echo — link hub</title>
    <meta name="description" content="Echo: gentle returns. Links for TestFlight, Instagram, and feedback." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="hero">
        <div class="kicker">link hub</div>
        <h1 id="title">Echo</h1>
        <div id="subtitle" class="subtitle">gentle returns</div>
      </header>

      <section class="feedback" aria-label="Quick feedback">
        <div class="feedbackTitle">Quick feedback</div>
        <div class="feedbackHint">One line is enough. Optional name + contact so we can follow up.</div>

        <form id="feedbackForm" class="feedbackForm">
          <input class="hp" type="text" name="website" autocomplete="off" tabindex="-1" />

          <label class="field">
            <div class="fieldLabel">Your one-liner</div>
            <textarea id="fbMessage" rows="3" placeholder="What should Echo return to you — and when?" required></textarea>
          </label>

          <div class="row">
            <label class="field">
              <div class="fieldLabel">Name (optional)</div>
              <input id="fbName" type="text" placeholder="Brian" />
            </label>

            <div class="field">
              <div class="fieldLabel">Contact (optional)</div>
              <div class="segmented" role="tablist" aria-label="Contact method">
                <button type="button" class="segBtn active" data-method="telegram">Telegram</button>
                <button type="button" class="segBtn" data-method="instagram">Instagram</button>
                <button type="button" class="segBtn" data-method="email">Email</button>
              </div>
              <input id="fbContact" type="text" placeholder="@handle or email" />
            </div>
          </div>

          <div class="actions">
            <button id="fbSubmit" class="submit" type="submit">Submit</button>
            <div id="fbStatus" class="status" aria-live="polite"></div>
          </div>
        </form>
      </section>

      <section id="links" class="links" aria-label="Links"></section>

      <footer class="footer">
        <div id="footerText"></div>
        <div class="fineprint" id="funFact"></div>
      </footer>
    </main>

    <script src="config.js?v=2"></script>
    <script>
      (function () {
        const cfg = window.LINKHUB || {};
        const title = cfg.title || "Echo";
        const subtitle = cfg.subtitle || "gentle returns";
        const feedbackEndpoint = cfg.feedbackEndpoint || "";
        document.title = `${title} — link hub`;

        const titleEl = document.getElementById("title");
        const subtitleEl = document.getElementById("subtitle");
        const linksEl = document.getElementById("links");
        const footerEl = document.getElementById("footerText");

        titleEl.textContent = title;
        subtitleEl.textContent = subtitle;

        const links = Array.isArray(cfg.links) ? cfg.links : [];
        for (const link of links) {
          const a = document.createElement("a");
          a.className = `card ${link.kind === "primary" ? "primary" : "secondary"}`;
          a.href = link.href || "#";
          if (link.sameTab) {
            a.target = "_self";
          } else {
            a.target = "_blank";
            a.rel = "noopener noreferrer";
          }

          const label = document.createElement("div");
          label.className = "label";
          label.textContent = link.label || "Link";

          const detail = document.createElement("div");
          detail.className = "detail";
          detail.textContent = link.detail || "";

          a.appendChild(label);
          a.appendChild(detail);
          linksEl.appendChild(a);
        }

        // Quick feedback
        let contactMethod = "telegram";
        const form = document.getElementById("feedbackForm");
        const statusEl = document.getElementById("fbStatus");
        const submitBtn = document.getElementById("fbSubmit");
        const messageEl = document.getElementById("fbMessage");
        const nameEl = document.getElementById("fbName");
        const contactEl = document.getElementById("fbContact");
        const segBtns = Array.from(document.querySelectorAll(".segBtn"));

        function setStatus(text, kind) {
          statusEl.textContent = text || "";
          statusEl.dataset.kind = kind || "";
        }

        function setMethod(method) {
          contactMethod = method;
          for (const b of segBtns) {
            b.classList.toggle("active", b.dataset.method === method);
          }
          contactEl.placeholder =
            method === "email" ? "email (optional)" : "@handle (optional)";
        }

        for (const b of segBtns) {
          b.addEventListener("click", () => setMethod(b.dataset.method));
        }
        setMethod(contactMethod);

        if (!feedbackEndpoint) {
          setStatus("(feedback endpoint not configured)", "warn");
          submitBtn.disabled = true;
        }

        form.addEventListener("submit", async (ev) => {
          ev.preventDefault();
          if (!feedbackEndpoint) return;

          const hp = form.querySelector('input[name="website"]');
          const payload = {
            message: messageEl.value.trim(),
            name: nameEl.value.trim(),
            contact_method: contactMethod,
            contact: contactEl.value.trim(),
            website: hp ? hp.value : "",
            user_agent: navigator.userAgent,
          };

          if (!payload.message) {
            setStatus("please add a one-liner.", "warn");
            return;
          }

          submitBtn.disabled = true;
          setStatus("sending…", "info");

          try {
            const res = await fetch(feedbackEndpoint, {
              method: "POST",
              headers: { "Content-Type": "text/plain;charset=utf-8" },
              body: JSON.stringify(payload),
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            setStatus("thank you — got it.", "ok");
            messageEl.value = "";
            nameEl.value = "";
            contactEl.value = "";
          } catch (err) {
            setStatus("couldn’t submit (try again in a moment).", "err");
          } finally {
            submitBtn.disabled = false;
          }
        });

        footerEl.textContent = cfg.footer || "";

        const funFacts = [
          "fun fact: ‘echo’ isn’t memory — it’s return.",
          "fun fact: we built this QR hub so the deck can stay minimal.",
          "fun fact: one-liners go straight into a spreadsheet (quietly).",
          "fun fact: we’re optimizing for calm, not dopamine.",
        ];
        const funFactEl = document.getElementById("funFact");
        if (funFactEl) {
          funFactEl.textContent = funFacts[Math.floor(Math.random() * funFacts.length)];
        }
      })();
    </script>
  </body>
</html>
